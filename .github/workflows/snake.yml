# Goes in your profile repo at:  .github/workflows/snake.yml
name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # rebuild once a day
  workflow_dispatch:        # ...and lets you run it manually
  push:
    branches: [main]

# Lets the built-in GITHUB_TOKEN push to the output branch (default is read-only)
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=%23c9a227&color_dots=%23161b22,%230b3d2e,%231a7a5a,%232ea36b,%2357c98a

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
